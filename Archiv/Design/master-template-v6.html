<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzwesir - Master Template V6</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blau: 'var(--color-blau)',
                        petrol: { DEFAULT: 'var(--color-petrol)', 50: 'var(--color-petrol-50)', 80: 'var(--color-petrol-80)', 20: 'var(--color-petrol-20)', tint: 'var(--color-petrol-tint)', 30: 'var(--color-petrol-30)' },
                        gelb: { DEFAULT: 'var(--color-gelb)', 80: 'var(--color-gelb-80)', tint: 'var(--color-gelb-tint)', 30: 'var(--color-gelb-30)' },
                        purpur: { DEFAULT: 'var(--color-purpur)', 80: 'var(--color-purpur-80)', tint: 'var(--color-purpur-tint)', 30: 'var(--color-purpur-30)' },
                        text: { DEFAULT: 'var(--color-text)', secondary: 'var(--color-text-sec)' },
                        background: 'var(--color-bg)',
                        border: 'var(--color-border)',
                    },
                    fontFamily: { display: ['"Archivo Black"', 'sans-serif'], body: ['"Source Sans Pro"', 'sans-serif'] },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(39, 39, 39, 0.05)', 'hover': '0 10px 25px -5px rgba(39, 39, 39, 0.1)' }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-petrol: #218380; --color-petrol-80: #4D9C99; --color-petrol-50: #90C1BF; --color-petrol-20: #D3E6E6; --color-petrol-tint: rgba(33, 131, 128, 0.08); --color-petrol-30: rgba(33, 131, 128, 0.3);
            --color-blau: #0071BF;
            --color-gelb: #DFC805; --color-gelb-80: #F9EF9E; --color-gelb-tint: rgba(223, 200, 5, 0.08); --color-gelb-30: rgba(223, 200, 5, 0.3);
            --color-purpur: #8D0267; --color-purpur-80: #C57EB2; --color-purpur-tint: rgba(141, 2, 103, 0.08); --color-purpur-30: rgba(141, 2, 103, 0.3);
            --color-text: #272727; --color-text-sec: #4C4C4C; --color-bg: #FFFFFF; --color-border: #E7ECEF;
        }

        .ci-link { color: var(--color-blau); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px; font-weight: 600; transition: all 0.2s ease-in-out; }
        .ci-link:hover { color: var(--color-petrol); text-decoration-color: var(--color-petrol); text-decoration-thickness: 3px; }
        .hard-rim { filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.25)); }
        *:focus-visible { outline: 2px solid var(--color-petrol); outline-offset: 2px; }

        /* GHOST CONTENT STYLES */
        .gh-content h1, .gh-content h2 { font-family: 'Archivo Black', sans-serif; letter-spacing: -0.02em; }
        .gh-content h3, .gh-content h4 { font-family: 'Source Sans Pro', sans-serif; font-weight: 700; }

        /* Standard Zitat (wird Premium durch CSS) */
        .gh-content blockquote {
            border-left: 4px solid var(--color-gelb); padding-left: 1.25rem; margin: 2rem 0;
            font-style: italic; color: var(--color-text); font-size: 1.125rem; line-height: 1.6; background: transparent;
        }
        @media (min-width: 768px) { .gh-content blockquote { padding-left: 1.5rem; font-size: 1.25rem; margin: 2.5rem 0; } }

        /* Tabellen Basis */
        .gh-content table { width: 100%; min-width: 600px; border-collapse: separate; border-spacing: 0; margin-bottom: 0; border: 1px solid var(--color-border); border-radius: 0.5rem; overflow: hidden; font-size: 0.875rem; }
        @media (min-width: 768px) { .gh-content table { font-size: 1rem; } }
        .gh-content th { background-color: var(--color-petrol); color: white; padding: 0.75rem; text-align: left; font-family: 'Source Sans Pro'; font-weight: 700; }
        .gh-content td { padding: 0.75rem; border-bottom: 1px solid var(--color-border); color: var(--color-text-sec); vertical-align: top; }
        @media (min-width: 768px) { .gh-content th, .gh-content td { padding: 1rem; } }
        .gh-content tr:nth-child(even) { background-color: #f9fafb; }

        /* Bilder & Reset */
        .gh-content img { display: block; margin: 2.5rem auto 1rem auto; max-width: 100%; height: auto; border-radius: 0.75rem; box-shadow: 0 4px 20px -2px rgba(39, 39, 39, 0.1); }
        .gh-content img.hard-rim { box-shadow: none !important; margin: 0 !important; border-radius: 0 !important; width: 100% !important; height: 100% !important; }
        .gh-content img + em { display: block; text-align: center; font-size: 0.9rem; color: #666; font-family: 'Source Sans Pro'; margin-bottom: 2.5rem; font-style: normal; }
        .gh-content img + em::before { content: "Abb.: "; font-weight: bold; color: var(--color-petrol); }
        
        /* Video */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.75rem; background-color: #f3f4f6; margin-bottom: 2rem; box-shadow: 0 4px 20px -2px rgba(39, 39, 39, 0.05); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Listen */
        .gh-content ul:not(.fw-checklist):not(.fw-warnlist) { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 2rem; color: var(--color-text-sec); }
        .gh-content ul:not(.fw-checklist):not(.fw-warnlist) li { margin-bottom: 0.5rem; marker: var(--color-petrol); }
        .gh-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 2rem; color: var(--color-text-sec); }
        .gh-content ol li { margin-bottom: 0.5rem; font-weight: 600; }
    </style>
</head>
<body class="font-body text-text-secondary bg-background antialiased leading-relaxed flex flex-col min-h-screen">

    <header id="mainHeader" class="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-border z-50 h-[72px] md:h-[82px] flex items-center">
        <div class="w-full max-w-[1400px] mx-auto px-6 md:px-8 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 md:gap-4 no-underline group relative z-50 shrink-0">
                <img src="./Kopf_Finazwesir_BigCircle.svg" alt="Finanzwesir" class="w-[40px] h-[40px] md:w-[50px] md:h-[50px]">
                <span class="font-display text-xl md:text-2xl text-petrol tracking-tight">FINANZWESIR</span>
            </a>
            <button class="xl:hidden text-3xl text-petrol p-2 relative z-50" id="navToggle">☰</button>
            <nav id="mainNav" class="hidden xl:block absolute xl:static top-[72px] md:top-[82px] left-0 right-0 bg-white xl:bg-transparent border-b xl:border-none border-border p-6 xl:p-0 shadow-soft xl:shadow-none z-40">
                <ul class="flex flex-col xl:flex-row gap-2 xl:gap-6 list-none m-0 p-0 flex-wrap justify-center">
                    <li><a href="/der-weg" class="font-semibold text-text hover:text-petrol block w-full py-3 xl:py-1 xl:w-auto border-b border-gray-100 xl:border-b-2 xl:border-transparent transition-colors">Der Weg</a></li>
                    </ul>
            </nav>
        </div>
    </header>
    <div id="navBackdrop" class="fixed inset-0 bg-black/20 z-30 hidden xl:hidden backdrop-blur-[2px]"></div>

    <main class="flex-grow w-full max-w-[800px] mx-auto px-4 md:px-6 py-12 md:py-20 gh-content">
        
        <h1 class="font-display text-4xl md:text-5xl text-petrol mb-12 tracking-tight border-b-2 border-gelb pb-6 break-words">[SEITENTITEL]</h1>
        <p class="text-xl md:text-2xl text-text font-normal mb-10 leading-normal">[LEAD-ABSATZ]</p>
        <p class="text-lg text-text-secondary leading-relaxed mb-6">[INHALT...]</p>
        </main>

    <footer class="bg-gray-100 border-t-2 border-petrol pt-16 pb-8 text-center mt-auto">
        <div class="max-w-[1000px] mx-auto px-6">
            <p class="text-xs text-[#999]">© 2025 Finanzwesir</p>
        </div>
    </footer>

    <script>
        // Mobile Nav
        const navToggle = document.getElementById('navToggle');
        const mainNav = document.getElementById('mainNav');
        const navBackdrop = document.getElementById('navBackdrop');
        const toggleMenu = () => {
            mainNav.classList.toggle('hidden');
            navBackdrop.classList.toggle('hidden');
        };
        navToggle.addEventListener('click', toggleMenu);
        navBackdrop.addEventListener('click', toggleMenu);

        // THE CONTENT PARSER (Der "Hausmeister")
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.querySelector('.gh-content');
            if (!content) return;

            // 1. WRAP TABLES (für Mobile Scrolling)
            const tables = content.querySelectorAll('table');
            tables.forEach(table => {
                if (!table.parentElement.classList.contains('overflow-x-auto')) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'overflow-x-auto my-8';
                    table.parentNode.insertBefore(wrapper, table);
                    wrapper.appendChild(table);
                }
            });

            // 2. CHECKLISTS & WARNLISTS (- [+] / - [-])
            const listItems = content.querySelectorAll('li');
            listItems.forEach(li => {
                const text = li.textContent.trim();
                if (text.startsWith('\[+]') || text.startsWith('[+]')) {
                    li.innerHTML = li.innerHTML.replace(/\[\+\]/g, '').trim();
                    li.parentElement.classList.add('fw-checklist', 'space-y-3', 'text-lg', 'mb-8');
                    li.parentElement.classList.remove('list-disc');
                    li.className = "flex items-start gap-3";
                    li.insertAdjacentHTML('afterbegin', `<svg class="w-6 h-6 text-petrol shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`);
                }
                else if (text.startsWith('\[-]') || text.startsWith('[-]')) {
                    li.innerHTML = li.innerHTML.replace(/\[\-\]/g, '').trim();
                    li.parentElement.classList.add('fw-warnlist', 'space-y-3', 'text-lg', 'mb-8');
                    li.parentElement.classList.remove('list-disc');
                    li.className = "flex items-start gap-3";
                    li.insertAdjacentHTML('afterbegin', `<svg class="w-6 h-6 text-purpur shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`);
                }
            });

            // 3. BOXES (> [!NOTE], > [!WARNING], > [!TIP])
            const blockquotes = content.querySelectorAll('blockquote');
            blockquotes.forEach(bq => {
                const text = bq.innerText.trim();
                let type = null;
                let title = "Hinweis";
                let icon = "Feder.svg";
                let cssClass = "bg-petrol-tint border-petrol-20";
                let iconBg = "bg-petrol-30";
                let titleColor = "text-petrol";
                let isFazit = false;

                if (text.includes('[!NOTE]')) { type = 'NOTE'; title = 'Wissenswert'; }
                else if (text.includes('[!WARNING]')) { type = 'WARNING'; title = 'Achtung'; icon = 'Schwert.svg'; cssClass = 'bg-white border-l-4 border-purpur shadow-soft'; iconBg = 'bg-purpur-30'; titleColor = 'text-purpur'; }
                else if (text.includes('[!TIP]')) { type = 'TIP'; isFazit = true; }

                if (type) {
                    // Cleanup Trigger
                    let cleanContent = bq.innerHTML.replace(/\[!(NOTE|WARNING|TIP)\]/g, '').replace(/^<p>/, '').replace(/<\/p>$/, '').trim();
                    
                    const box = document.createElement('div');
                    
                    if (isFazit) {
                        box.className = "bg-gray-50 rounded-xl p-6 md:p-8 border border-gray-200 shadow-sm my-8";
                        box.innerHTML = `<h4 class="font-display text-xl text-petrol mb-4">Fazit</h4><div class="text-text-secondary m-0 text-lg">${cleanContent}</div>`;
                    } else {
                        box.className = `${cssClass} rounded-xl p-6 md:p-8 my-8 flex flex-col md:flex-row gap-4 md:gap-8 items-start`;
                        box.innerHTML = `
                            <div class="w-16 h-16 md:w-[72px] md:h-[72px] shrink-0 flex items-center justify-center rounded-2xl ${iconBg} p-1">
                                <img src="${icon}" alt="${type}" class="w-full h-full object-contain hard-rim">
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-display text-lg md:text-xl ${titleColor} mb-2 mt-1">${title}</h4>
                                <div class="text-text-secondary m-0 text-lg leading-relaxed">${cleanContent}</div>
                            </div>
                        `;
                    }
                    bq.replaceWith(box);
                }
            });
        });
    </script>
</body>
</html>
