<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Golden Master Target Replay Fixture — State Mismatch</title>
</head>
<body data-motion-state="unknown">
  <p id="counter">5</p>
  <button id="increment-btn" type="button" class="btn">+1</button>
  <script>
    (function () {
      var counter = document.getElementById('counter');
      var btn = document.getElementById('increment-btn');
      var n = 5;
      btn.addEventListener('click', function () {
        n += 1;
        counter.textContent = String(n);
        btn.classList.add('is-clicked');
      });
      var mql = window.matchMedia('(prefers-reduced-motion: reduce)');
      document.body.setAttribute('data-motion-state', mql.matches ? 'reduced' : 'normal');
    })();
  </script>
</body>
</html>
